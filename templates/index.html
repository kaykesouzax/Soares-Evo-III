<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soares Evolucion III</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --red: #e8001d;
      --border: #1e1e1e;
      --muted: #555;
      --glass-bg: rgba(30, 30, 30, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        linear-gradient(rgba(232, 0, 29, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 0, 29, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    
    .menu-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 44px;
      height: 44px;
      background: transparent;
      border: 1.5px solid var(--glass-border);
      border-radius: 8px;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .menu-btn:hover {
      border-color: var(--red);
      background: rgba(232, 0, 29, 0.05);
    }
    .menu-btn span {
      width: 20px;
      height: 2px;
      background: #fff;
      transition: all 0.3s ease;
    }
    .menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
    .menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }
    
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100vh;
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-right: 1px solid var(--glass-border);
      z-index: 1000;
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 88px 24px 24px 24px;
    }
    .sidebar.open {
      left: 0;
    }
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .sidebar-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .sidebar-close {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }
    .sidebar-close:hover {
      color: var(--red);
    }
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-nav a {
      padding: 14px 16px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      font-weight: 500;
      font-size: 15px;
      border: 1px solid transparent;
    }
    .sidebar-nav a:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-color: var(--glass-border);
    }
    .sidebar-nav a.active {
      background: linear-gradient(135deg, rgba(232, 0, 29, 0.15), rgba(232, 0, 29, 0.05));
      color: #fff;
      border-color: rgba(232, 0, 29, 0.3);
    }
    
    header {
      background: var(--border);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: #fff;
    }
    .header-title span { color: var(--red); }
    .header-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    
    main {
      flex: 1;
      padding: 32px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      display: none;
    }
    .panel.active { display: block; }
    
    .steps {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .step {
      flex: 1;
      max-width: 200px;
      padding: 12px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    .step.active {
      background: linear-gradient(135deg, var(--red), #c00018);
      color: #fff;
      border-color: var(--red);
    }
    
    .input-group {
      margin-bottom: 24px;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .file-upload-btn {
      display: inline-block;
      padding: 8px 16px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }
    .file-upload-btn:hover {
      border-color: var(--red);
      background: rgba(232, 0, 29, 0.1);
    }
    .file-upload-btn input[type="file"] {
      display: none;
    }
    .file-name {
      font-size: 12px;
      color: var(--muted);
      margin-left: 8px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      resize: vertical;
      transition: border-color 0.2s ease;
    }
    textarea:focus {
      outline: none;
      border-color: var(--red);
    }
    .line-counter {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .line-counter.active { color: var(--red); }
    
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      margin-top: 32px;
    }
    button, .btn-primary, .btn-secondary {
      padding: 14px 32px;
      border: none;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--red), #c00018);
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(232, 0, 29, 0.3);
    }
    .btn-primary.loading::after {
      content: "";
      margin-left: 8px;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-secondary {
      background: var(--border);
      color: #fff;
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--red);
      background: rgba(232, 0, 29, 0.1);
    }
    .status {
      font-size: 13px;
      color: var(--red);
      margin-left: 16px;
    }
    
    .preview-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 20px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .tab:hover {
      border-color: var(--red);
      color: #fff;
    }
    .tab.active {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--border);
      padding: 12px;
      text-align: center;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 11px;
      border: 1px solid var(--border);
    }
    tbody td {
      padding: 10px;
      text-align: center;
      border: 1px solid var(--border);
    }
    tbody td:nth-child(2) {
      text-align: left;
    }
    .pos {
      display: inline-block;
      min-width: 32px;
      padding: 4px 8px;
      background: var(--border);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }
    .pos.top1 {
      background: var(--red);
      color: #fff;
    }
    .total-row {
      background: var(--border);
      font-weight: 600;
    }
    
    footer {
      background: var(--border);
      padding: 16px 32px;
      text-align: center;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .footer-main {
      margin-bottom: 4px;
    }
    .sep {
      margin: 0 8px;
      color: var(--red);
    }
    .footer-data {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }
  </style>
</head>
<body>
<button class="menu-btn" id="menuBtn">
  <span></span>
  <span></span>
  <span></span>
</button>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<nav class="sidebar" id="sidebar">
  <button class="sidebar-close" id="sidebarClose">×</button>
  <div class="sidebar-nav">
    <a href="#" data-page="ranking" class="active">Ranking de Vendas</a>
    <a href="#" data-page="estoque">Resumo Estoque</a>
  </div>
</nav>

<header>
  <div>
    <div class="header-title">SOARES EVOLUCION III <span>|</span> <span id="pageTitle">RELATÓRIO DE VENDAS</span></div>
  </div>
  <div class="header-subtitle">GERAÇÃO AUTOMÁTICA</div>
</header>

<main>
  <div class="page active" id="page-ranking">
    <div class="steps">
      <div class="step active" id="step-1">1. Dados do Período</div>
      <div class="step" id="step-2">2. Processando</div>
      <div class="step" id="step-3">3. Gerar Excel</div>
    </div>

    <div class="panel active" id="panel-1">
      <div class="input-group">
        <label>BASE DE COTAS</label>
        <textarea id="input-cotas" placeholder="Cole aqui os dados de cotas..."></textarea>
        <span class="line-counter" id="cnt-cotas">0 linhas</span>
      </div>
      <div class="input-group">
        <label>BASE DE NOVOS</label>
        <textarea id="input-novos" placeholder="Cole aqui os dados de novos..."></textarea>
        <span class="line-counter" id="cnt-novos">0 linhas</span>
      </div>
      <div class="actions">
        <button class="btn-primary" id="btn-proximo" onclick="processar()">Próximo →</button>
        <button class="btn-secondary" onclick="limpar()">Limpar</button>
        <span class="status" id="status-1"></span>
      </div>
    </div>

    <div class="panel" id="panel-2">
      <div style="text-align:center;padding:64px 0;">
        <div style="font-size:48px;margin-bottom:16px;">⚙️</div>
        <div style="font-size:18px;color:var(--muted);">Processando dados...</div>
      </div>
    </div>

    <div class="panel" id="panel-3">
      <div class="preview-tabs">
        <button class="tab active" onclick="trocarAba('geral', this)">Geral</button>
        <button class="tab" onclick="trocarAba('labrea', this)">Lábrea</button>
        <button class="tab" onclick="trocarAba('boca', this)">Boca do Acre</button>
        <button class="tab" onclick="trocarAba('humaita', this)">Humaitá</button>
        <button class="tab" onclick="trocarAba('zerados', this)">Zerados</button>
      </div>
      <div class="table-wrap" id="tabela-wrap"></div>
      <div class="actions">
        <button class="btn-primary" onclick="baixar()">↓ Baixar Excel</button>
        <button class="btn-secondary" onclick="irPara(1)">← Recomeçar</button>
        <span class="status" id="status-3"></span>
      </div>
    </div>
  </div>

  <div class="page" id="page-estoque">
    <div class="panel active">
      <div class="input-group">
        <label>DADOS DO ESTOQUE</label>
        <label class="file-upload-btn">
          📁 Upload Excel
          <input type="file" id="upload-estoque" accept=".xlsx,.xls">
        </label>
        <span class="file-name" id="file-name-estoque"></span>
        <textarea id="input-estoque" placeholder="Ou cole aqui os dados do estoque (tab-separated)..."></textarea>
        <span class="line-counter" id="cnt-estoque">0 linhas</span>
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="gerarEstoque()">Gerar Planilha</button>
        <button class="btn-secondary" onclick="limparEstoque()">Limpar</button>
        <span class="status" id="status-estoque"></span>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-main">
    Soares Evolucion III <span class="sep">·</span> Relatório de Vendas <span class="sep">—</span> Site feito por Kayke
  </div>
  <div class="footer-data" id="footer-data">—</div>
</footer>

<script>
// MENU & NAVIGATION
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarClose = document.getElementById('sidebarClose');
const navLinks = document.querySelectorAll('.sidebar-nav a');

menuBtn.addEventListener('click', () => {
  menuBtn.classList.toggle('active');
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('active');
});

sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

function closeSidebar() {
  menuBtn.classList.remove('active');
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('active');
}

navLinks.forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const page = link.dataset.page;
    navLinks.forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('pageTitle').textContent = page === 'ranking' ? 'RELATÓRIO DE VENDAS' : 'RESUMO ESTOQUE';
    closeSidebar();
  });
});

// DADOS DEMO RANKING
const dadosDemo = {
  geral: [
    [1,"LUAN HENRIQUE","HUMAITÁ",10,12,22],[2,"THALYS CASTRO","LÁBREA",6,8,14],
    [3,"ANTONIO MARCIO","LÁBREA",5,4,9],[4,"WENDEL SILVA","BOCA DO ACRE",4,5,9],
    [5,"ANDREI ALVES","HUMAITÁ",3,6,9],
  ],
  labrea: [
    [1,"THALYS CASTRO","LÁBREA",6,8,14],[2,"ANTONIO MARCIO","LÁBREA",5,4,9],
  ],
  boca: [
    [1,"WENDEL SILVA","BOCA DO ACRE",4,5,9],
  ],
  zerados: [
    [1,"ALEXSANDRO SOUZA","LÁBREA",0,0,0],
    [2,"ANGELA ALMEIDA","LÁBREA",0,0,0],
  ],
  humaita: [
    [1,"LUAN HENRIQUE","HUMAITÁ",10,12,22],[2,"ANDREI ALVES","HUMAITÁ",3,6,9],
  ],
};

// CONTADOR DE LINHAS
function contarLinhas(id, cntId) {
  document.getElementById(id).addEventListener('input', () => {
    const n = document.getElementById(id).value.split('\n').filter(l => l.trim()).length;
    const el = document.getElementById(cntId);
    el.textContent = n + ' linha' + (n !== 1 ? 's' : '');
    el.classList.toggle('active', n > 0);
  });
}
contarLinhas('input-cotas','cnt-cotas');
contarLinhas('input-novos','cnt-novos');
contarLinhas('input-estoque','cnt-estoque');

// ESTOQUE - UPLOAD
document.getElementById('upload-estoque').addEventListener('change', (e) => {
  const fileName = e.target.files[0]?.name || '';
  document.getElementById('file-name-estoque').textContent = fileName ? `📄 ${fileName}` : '';
});

// RANKING - NAVEGAÇÃO
function irPara(n) {
  [1,2,3].forEach(i => {
    document.getElementById('panel-'+i).classList.toggle('active', i===n);
    document.getElementById('step-'+i).classList.toggle('active', i===n);
  });
}

let dadosReais = null;

// RANKING - PROCESSAR
async function processar() {
  const cotas = document.getElementById('input-cotas').value.trim();
  const novos = document.getElementById('input-novos').value.trim();
  if (!cotas && !novos) { document.getElementById('status-1').textContent = '⚠ Cole ao menos uma base.'; return; }
  document.getElementById('status-1').textContent = '';
  const btn = document.getElementById('btn-proximo');
  btn.classList.add('loading'); btn.textContent = 'Processando';
  irPara(2);

  try {
    const prevResp = await fetch('/preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cotas, novos })
    });

    if (!prevResp.ok) {
      const err = await prevResp.json();
      btn.classList.remove('loading'); btn.textContent = 'Próximo →';
      irPara(1);
      document.getElementById('status-1').textContent = '⚠ ' + (err.erro || 'Erro ao processar.');
      return;
    }

    dadosReais = await prevResp.json();

    const resp = await fetch('/gerar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cotas, novos })
    });

    if (resp.ok) {
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = resp.headers.get('Content-Disposition')?.split('filename=')[1] || 'relatorio.xlsx';
      a.click(); URL.revokeObjectURL(url);
    }

    btn.classList.remove('loading'); btn.textContent = 'Próximo →';
    irPara(3);
    renderTabela('geral');
    const agora = new Date().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'medium'});
    const total = (dadosReais.geral || []).length;
    document.getElementById('footer-data').textContent = agora + ' · ' + total + ' vendedores';

  } catch(e) {
    btn.classList.remove('loading'); btn.textContent = 'Próximo →';
    irPara(1);
    document.getElementById('status-1').textContent = '⚠ Falha na conexão com o servidor.';
  }
}

// RANKING - RENDER TABELA
function renderTabela(aba) {
  const dados = (dadosReais && dadosReais[aba]) ? dadosReais[aba] : dadosDemo[aba];
  const isZerados = aba === 'zerados';

  const totalC = dados.reduce((a,r)=>a+r[3],0);
  const totalN = dados.reduce((a,r)=>a+r[4],0);
  const totalT = dados.reduce((a,r)=>a+r[5],0);

  const rows = dados.map(r => `
    <tr>
      <td><span class="pos ${r[0]===1&&!isZerados?'top1':''}">${r[0]}</span></td>
      <td>${r[1]}</td>
      ${isZerados ? `<td>${r[2]}</td>` : ''}
      <td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td>
    </tr>`).join('');

  const thPdv = isZerados ? '<th>PDV</th>' : '';
  const tdPdv = isZerados ? '<td>—</td>' : '';

  document.getElementById('tabela-wrap').innerHTML = `
    <table>
      <thead><tr><th>Pos.</th><th style="text-align:left">Nome do Vendedor</th>${thPdv}<th>Cotas</th><th>Novos</th><th>Total</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>—</td><td style="text-align:left">${isZerados ? dados.length + ' vendedores' : 'Total Geral'}</td>${tdPdv}<td>${totalC}</td><td>${totalN}</td><td>${totalT}</td></tr></tbody>
    </table>`;
}

function trocarAba(aba, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTabela(aba);
}

function limpar() {
  ['input-cotas','input-novos'].forEach(id => document.getElementById(id).value = '');
  ['cnt-cotas','cnt-novos'].forEach(id => { const e = document.getElementById(id); e.textContent='0 linhas'; e.classList.remove('active'); });
  document.getElementById('status-1').textContent = '';
  document.getElementById('footer-data').textContent = '—';
}

function baixar() {
  document.getElementById('btn-proximo').click();
}

// ESTOQUE - GERAR
async function gerarEstoque() {
  const textarea = document.getElementById('input-estoque').value.trim();
  const fileInput = document.getElementById('upload-estoque');
  const file = fileInput.files[0];

  if (!file && !textarea) {
    document.getElementById('status-estoque').textContent = '⚠ Forneça dados de texto ou arquivo.';
    return;
  }

  document.getElementById('status-estoque').textContent = 'Gerando...';

  try {
    const formData = new FormData();
    if (file) {
      formData.append('arquivo', file);
    } else {
      formData.append('texto', textarea);
    }

    const resp = await fetch('/estoque', {
      method: 'POST',
      body: formData
    });

    if (resp.ok) {
      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = 'Estoque Atual.xlsx';
      a.click();
      URL.revokeObjectURL(url);
      document.getElementById('status-estoque').textContent = '✓ Planilha gerada!';
    } else {
      const err = await resp.json().catch(() => ({erro: 'Erro desconhecido'}));
      console.error('Erro do servidor:', err);
      document.getElementById('status-estoque').textContent = '⚠ ' + (err.erro || 'Erro ao gerar.');
    }
  } catch(e) {
    console.error('Erro de conexão:', e);
    document.getElementById('status-estoque').textContent = '⚠ Falha na conexão: ' + e.message;
  }
}

function limparEstoque() {
  document.getElementById('input-estoque').value = '';
  document.getElementById('upload-estoque').value = '';
  document.getElementById('file-name-estoque').textContent = '';
  document.getElementById('cnt-estoque').textContent = '0 linhas';
  document.getElementById('cnt-estoque').classList.remove('active');
  document.getElementById('status-estoque').textContent = '';
}
</script>
